<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ilkin Isler | AI Engineer, Researcher, Champion</title>
  <meta name="description" content="Ilkin Isler is a Senior AI Engineer and PhD building high-impact, trustworthy AI systems.">

  <link rel="apple-touch-icon" sizes="180x180" href="favicons/apple-icon-180x180.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicons/favicon-16x16.png">
  <meta name="theme-color" content="#f8f9ff">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/main.css">
  <script src="js/chat-config.js"></script>
  <script src="js/main.js" defer></script>
</head>
<body data-page="home">
  <div data-include="navbar.html"></div>

  <main class="page-frame" id="top">
    <div class="site-shell">
      <section class="hero reveal" aria-label="Homepage hero">
        <div class="hero-inner">
          <p class="hero-pretitle">Multidimensional AI Builder</p>

          <h1 class="hero-title">
            Ilkin Isler, PhD
            <br>
            <span class="gradient">AI Engineer. Researcher. Champion.</span>
          </h1>

          <p class="hero-subtitle">
            I build secure, trustworthy AI systems for high-stakes real-world use.
          </p>

          <div class="hero-visual-wrap" aria-hidden="true">
            <div class="hero-visual-glow"></div>
            <div class="hero-visual-ring"></div>
            <div class="hero-visual">
              <img src="assets/avatar-main.jpg" alt="Portrait of Ilkin Isler">
            </div>
          </div>

          <div class="card chatbot-shell hero-chat" id="chat" data-bio-chatbot>
            <p class="chat-intro" data-chat-intro>
              Tell me what you need and I will pull the right projects, research, CV, media, or contact links.
            </p>
            <p class="chat-source-note" data-chat-source-note>
              Grounded knowledge base: resume + UCF article.
            </p>

            <ul class="chat-log" data-chat-log aria-live="polite" aria-label="Chat messages" hidden></ul>

            <div class="chat-suggestions" aria-label="Suggested questions">
              <button type="button" class="command-shortcut" data-chat-suggestion="Can you tell me about your background?">Can you tell me about your background?</button>
              <button type="button" class="command-shortcut" data-chat-suggestion="What projects are you building?">What projects are you building?</button>
              <button type="button" class="command-shortcut" data-chat-suggestion="What is your research focus?">What is your research focus?</button>
              <button type="button" class="command-shortcut" data-chat-suggestion="How much can you deadlift?">How much can you deadlift?</button>
              <button type="button" class="command-shortcut" data-chat-suggestion="Where can I see your media links?">Where can I see your media links?</button>
              <button type="button" class="command-shortcut" data-chat-suggestion="How can I contact you?">How can I contact you?</button>
            </div>

            <form class="chat-form" data-chat-form>
              <label class="sr-only" for="chat-input">Ask a question</label>
              <input id="chat-input" class="chat-input" data-chat-input type="text" placeholder="Message..." autocomplete="off" required>
              <button class="chat-send" type="submit" aria-label="Send message">
                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M12 17V7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                  <path d="M8 11l4-4 4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </button>
            </form>
          </div>
        </div>
      </section>

    </div>
  </main>

  <div data-include="footer.html"></div>
</body>
</html>
